<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat vs Dog Classifier</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }

        input[type="file"] {
            margin: 20px 0;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        #preview {
            margin-top: 20px;
            max-width: 300px;
            border-radius: 10px;
            display: none;
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐱 Cat vs 🐶 Dog Classifier</h1>
        <p>Upload an image to classify whether it is a Cat or a Dog using SVM.</p>

        <input type="file" id="imageInput" accept="image/*">
        <br>
        <button onclick="predictImage()">Predict</button>

        <br>
        <img id="preview" alt="Image Preview">

        <div id="result"></div>
    </div>

    <script>
        const imageInput = document.getElementById("imageInput");
        const preview = document.getElementById("preview");

        imageInput.addEventListener("change", function() {
            const file = this.files[0];

            if (file) {
                const reader = new FileReader();

                reader.addEventListener("load", function() {
                    preview.setAttribute("src", this.result);
                    preview.style.display = "block";
                });

                reader.readAsDataURL(file);
            }
        });

        function predictImage() {
            const result = document.getElementById("result");

            if (!imageInput.files.length) {
                result.innerHTML = "Please upload an image first!";
                result.style.color = "red";
                return;
            }

            // Placeholder prediction
            const predictions = ["🐱 Cat", "🐶 Dog"];
            const prediction = predictions[Math.floor(Math.random() * predictions.length)];

            result.innerHTML = "Prediction: " + prediction;
            result.style.color = "green";
        }
    </script>

</body>
</html>
